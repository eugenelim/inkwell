name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          # Always pull the latest 1.25.x patch so new stdlib CVEs land
          # automatically on the next build. go.mod's `go 1.25.3` floor
          # rejects older patches; this widens the ceiling to the
          # newest fix.
          go-version: 1.25.x
          check-latest: true
          cache: true

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: race tests
        run: go test -race -timeout 5m ./...

      - name: e2e tests
        run: go test -tags=e2e -timeout 5m ./...

      - name: benchmarks (informational, non-gating)
        run: go test -bench=. -benchmem -run='^$' -timeout 5m ./... || true

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          $(go env GOPATH)/bin/staticcheck ./... || true

      - name: privacy guard - testdata never contains real domains
        run: |
          set -e
          # Match any email address whose domain is not example.invalid.
          # Using grep -P for proper negative-lookahead on the alternation.
          if grep -rEi --include='*.json' --include='*.golden' --include='*.html' --include='*.txt' \
              "@([A-Za-z0-9._-]+)\.(com|org|net|io|co|uk|de|fr)" internal/ docs/ 2>/dev/null; then
            echo "::error::testdata contains a non-example.invalid domain. Use example.invalid for fixtures."
            exit 1
          fi

  permissions-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: refuse forbidden Graph scopes
        run: |
          set -e
          # Hard out-of-scope per PRD §3.2. Match quoted scope-string
          # literals only (real OAuth scope requests are always quoted),
          # so explanatory comments mentioning the forbidden scopes are
          # fine.
          if grep -rE '"[^"]*(Mail\.Send|Calendars\.ReadWrite|Mail\.[A-Za-z]+\.Shared|ChatMessage\.Send|Channel\.ReadBasic\.All)[^"]*"' \
              --include='*.go' .; then
            echo "::error::Code references a Graph scope that is hard out-of-scope per PRD §3.2"
            exit 1
          fi
