name: ci

# Heavy Go test pipeline (race, e2e, budget, benchmarks, fuzz,
# staticcheck). The `test` job dominates CI runtime — benchmarks
# alone is ~17 min on the runner — so we skip it for docs-only
# changes. The always-runs gates (doc-sweep, privacy guard) live
# in docs-checks.yml so they still fire for those PRs.
#
# paths-ignore: a PR that mixes docs + code still triggers the
# full pipeline (any non-ignored path brings it back). Workflow
# file changes are intentionally NOT ignored — workflow edits
# must be tested by running.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CLAUDE.md'
      - '.claude/**'
      - '.gitignore'
      - 'LICENSE*'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CLAUDE.md'
      - '.claude/**'
      - '.gitignore'
      - 'LICENSE*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Always pull the latest 1.25.x patch so new stdlib CVEs land
          # automatically on the next build. go.mod's `go 1.25.3` floor
          # rejects older patches; this widens the ceiling to the
          # newest fix.
          go-version: 1.25.x
          check-latest: true
          cache: true

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: race tests
        run: go test -race -timeout 5m ./...

      - name: e2e tests
        run: go test -tags=e2e -timeout 5m ./...

      - name: budget gate (TestBudgetsHonoured without -race)
        run: go test -run TestBudgetsHonoured -timeout 15m ./internal/store/...

      - name: benchmarks (gating — panics fail the build)
        run: go test -bench=. -benchmem -run='^$' -timeout 10m ./...

      - name: fuzz regression (corpus replay + 30s sweep)
        run: |
          # First replay any committed corpus entries as deterministic unit tests.
          go test -run 'FuzzParse|FuzzCompileLocal' -timeout 60s ./internal/pattern/...
          # Then do a live 30-second sweep. -timeout 90s gives the fuzz engine
          # headroom to exit cleanly after the fuzztime deadline fires; without
          # it Go's context cancellation at t=30s is occasionally mis-reported
          # as "context deadline exceeded" instead of a clean stop.
          go test -fuzz=FuzzParse      -fuzztime=30s -timeout=90s ./internal/pattern/...
          go test -fuzz=FuzzCompileLocal -fuzztime=30s -timeout=90s ./internal/pattern/...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          $(go env GOPATH)/bin/staticcheck ./... || true

      # doc-sweep and the privacy guard moved to docs-checks.yml so
      # they fire for docs-only PRs that skip this `test` job.

  permissions-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: refuse forbidden Graph scopes
        run: |
          set -e
          # Hard out-of-scope per PRD §3.2. Match quoted scope-string
          # literals only (real OAuth scope requests are always quoted),
          # so explanatory comments mentioning the forbidden scopes are
          # fine.
          if grep -rE '"[^"]*(Mail\.Send|Calendars\.ReadWrite|Mail\.[A-Za-z]+\.Shared|ChatMessage\.Send|Channel\.ReadBasic\.All)[^"]*"' \
              --include='*.go' .; then
            echo "::error::Code references a Graph scope that is hard out-of-scope per PRD §3.2"
            exit 1
          fi
