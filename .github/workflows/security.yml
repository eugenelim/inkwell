name: security

# Go-specific SAST and vulnerability scanners. All three independently
# scan Go source / module graph; none of them have anything useful to
# say about a docs-only change, so we apply the same `paths-ignore`
# as ci.yml.
#
# Always-on secret + dependency gates (gitleaks, dependency-review)
# moved to always-checks.yml — they're meaningful regardless of
# whether Go code changed and don't share the toolchain setup cost
# this workflow's jobs pay.
#
# False-positive policy: code-line annotations only (#nosec for gosec,
# // nosemgrep for Semgrep). Avoid global suppressions; every
# suppression carries a one-line WHY in the comment so the next
# reviewer can re-evaluate. govulncheck doesn't support per-line
# suppression — if a CVE doesn't apply, document the rationale in the
# PR description and pin the dependency to a fixed version.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CLAUDE.md'
      - '.claude/**'
      - '.gitignore'
      - 'LICENSE*'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CLAUDE.md'
      - '.claude/**'
      - '.gitignore'
      - 'LICENSE*'
  schedule:
    # Weekly run catches new CVEs against unchanged code.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Latest 1.25.x patch. Without this, setup-go pins go.mod's
          # exact `go` directive and govulncheck reports stdlib CVEs
          # that are already fixed in newer patches.
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: run gosec
        run: |
          $(go env GOPATH)/bin/gosec \
            -fmt=sarif -out=gosec.sarif \
            -exclude-dir=docs -exclude-generated \
            ./... || true
      - name: upload sarif
        uses: actions/upload-artifact@v7
        with:
          name: gosec-sarif
          path: gosec.sarif
      - name: gate (text)
        run: |
          $(go env GOPATH)/bin/gosec \
            -fmt=text \
            -exclude-dir=docs -exclude-generated \
            ./...

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - name: run semgrep
        run: |
          semgrep \
            --config=p/golang \
            --config=p/security-audit \
            --config=p/secrets \
            --error \
            --metrics=off \
            --exclude=docs \
            --exclude=internal/graph/testdata \
            --sarif --output=semgrep.sarif \
            ./
      - name: upload sarif
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Latest 1.25.x patch. Without this, setup-go pins go.mod's
          # exact `go` directive and govulncheck reports stdlib CVEs
          # that are already fixed in newer patches.
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: run govulncheck
        run: $(go env GOPATH)/bin/govulncheck ./...
