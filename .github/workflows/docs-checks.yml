name: docs-checks

# Cheap, always-runs gates that don't depend on a Go toolchain or
# the test suite. Split out from ci.yml so a docs-only PR still
# exercises these checks even when ci.yml's `test` job is skipped
# via paths-ignore.
#
# Keep this workflow fast (~30s total). If a check needs to compile
# or test Go, it belongs in ci.yml, not here.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  doc-sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: doc-sweep (CLAUDE.md §12.6 mechanical checks)
        run: bash scripts/doc-sweep.sh

  privacy-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: testdata never contains real domains
        run: |
          set -e
          # Match any email address whose domain is not example.invalid.
          if grep -rEi --include='*.json' --include='*.golden' --include='*.html' --include='*.txt' \
              "@([A-Za-z0-9._-]+)\.(com|org|net|io|co|uk|de|fr)" internal/ docs/ 2>/dev/null; then
            echo "::error::testdata contains a non-example.invalid domain. Use example.invalid for fixtures."
            exit 1
          fi
