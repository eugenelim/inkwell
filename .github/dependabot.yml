# Dependabot configuration. Spec 17 §3.8.
#
# Weekly updates: keeps the dependency graph fresh enough that
# govulncheck rarely has to fail builds for a long-known CVE, and
# rare enough that PR review noise stays manageable.
#
# **Why everything is grouped.** Without grouping, Dependabot opens
# one PR per dependency. When two PRs touch overlapping lines (e.g.
# every CI job has both `actions/checkout` and `actions/setup-go`
# in adjacent step lines, so two simultaneous bumps share neighbour
# lines), merging the first creates a 3-way conflict for every
# subsequent PR. With ~6 actions in our workflows × 4 actions
# Dependabot is currently watching, that's a guaranteed recurring
# rebase chore. Grouping into one weekly PR per ecosystem
# eliminates the conflict by construction: Dependabot rebases the
# single PR once and we merge it once.
#
# Lesson from v0.13.x post-mortem: the first weekly run shipped 4
# separate github-actions PRs (checkout, setup-go, upload-artifact,
# goreleaser). Three merged cleanly; the fourth needed manual
# rebase + force-push because checkout's bump had moved the
# neighbour line setup-go was anchoring against. Cost: 15 minutes
# of cherry-picking conflict markers. That's the maximum tolerated
# cost; this config prevents it.

version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group everything by default. Sub-groupings below carve out
      # the families we know move together (charm releases lipgloss
      # + bubbles + bubbletea simultaneously; golang.org/x/* often
      # bumps in lockstep with stdlib floors). A blanket group
      # avoids the per-PR-conflict pattern; the family groups make
      # the diff easier to review when several charm packages bump
      # at once.
      charm:
        patterns:
          - "github.com/charmbracelet/*"
      gostdlibx:
        patterns:
          - "golang.org/x/*"
      # Catch-all for everything else (single weekly PR).
      gomod-other:
        patterns:
          - "*"
        exclude-patterns:
          - "github.com/charmbracelet/*"
          - "golang.org/x/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(actions)"
    groups:
      # ALL github-actions bumps in one weekly PR — actions tend to
      # appear together in step blocks, so per-PR bumps create the
      # conflict pattern documented in the comment above.
      github-actions-all:
        patterns:
          - "*"
